<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兵營生產系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 設定畫面 -->
        <div class="setup-panel" id="setupPanel">
            <h2>⚔️ 兵營生產系統</h2>
            
            <div class="mode-buttons">
                <button class="mode-btn active" id="presetMode" onclick="selectMode('preset')">
                    <h4>📋 預設模式</h4>
                    <p>使用預設參數開始遊戲</p>
                </button>
                <button class="mode-btn" id="customMode" onclick="selectMode('custom')">
                    <h4>⚙️ 自訂模式</h4>
                    <p>修改初始參數</p>
                </button>
            </div>

            <!-- 預設模式說明 -->
            <div id="presetInfo" style="background: #f5f5f5; padding: 16px; border-radius: 6px; margin-bottom: 20px;">
                <p><strong>預設參數：</strong></p>
                <ul style="margin: 8px 0 0 20px; font-size: 0.9rem; color: #555;">
                    <li>初始黃金：150</li>
                    <li>兵營容量：2</li>
                    <li>劍士：20金 / 弓手：30金 / 騎士：50金 / 投石車：40金</li>
                </ul>
            </div>

            <!-- 自訂設定表單 -->
            <div class="settings-form" id="settingsForm">
                <div class="form-group">
                    <label>初始黃金</label>
                    <input type="number" id="initialGold" value="150" min="0">
                </div>
                <div class="form-group">
                    <label>兵營佇列容量</label>
                    <input type="number" id="queueCapacity" value="2" min="1" max="5">
                </div>
                <div class="form-group">
                    <label>單位生產成本</label>
                    <div class="unit-costs">
                        <div>
                            <label style="font-size: 0.85rem; color: #777;">劍士</label>
                            <input type="number" id="costSword" value="20" min="0">
                        </div>
                        <div>
                            <label style="font-size: 0.85rem; color: #777;">弓手</label>
                            <input type="number" id="costArcher" value="30" min="0">
                        </div>
                        <div>
                            <label style="font-size: 0.85rem; color: #777;">騎士</label>
                            <input type="number" id="costKnight" value="50" min="0">
                        </div>
                        <div>
                            <label style="font-size: 0.85rem; color: #777;">投石車</label>
                            <input type="number" id="costCatapult" value="40" min="0">
                        </div>
                    </div>
                </div>
            </div>

            <button class="start-btn" onclick="startGame()">開始遊戲</button>
        </div>

        <!-- 遊戲畫面 -->
        <div class="game-panel" id="gamePanel">
            <!-- 狀態列 -->
            <div class="status-bar">
                <div class="status-item">
                    <span class="label">回合</span>
                    <span class="value" id="roundNum">0</span>
                </div>
                <div class="status-item">
                    <span class="label">黃金</span>
                    <span class="value" id="goldAmount">150</span>
                </div>
                <button class="reset-btn" onclick="resetGame()">↺ 重新開始</button>
            </div>

            <!-- 遊戲內容 -->
            <div class="game-content">
                <!-- 兵營 -->
                <div class="barracks-area">
                    <div class="barrack">
                        <div class="barrack-header">
                            <h3>🏭 A 廠</h3>
                            <span class="queue-status">佇列: <span id="countA">0</span> / <span class="capacity">2</span></span>
                        </div>
                        <div class="queue-slots" id="queueA">
                            <!-- 動態生成 -->
                        </div>
                        <div class="output-area idle" id="outputA">
                            等待生產...
                        </div>
                    </div>

                    <div class="barrack">
                        <div class="barrack-header">
                            <h3>🏭 B 廠</h3>
                            <span class="queue-status">佇列: <span id="countB">0</span> / <span class="capacity">2</span></span>
                        </div>
                        <div class="queue-slots" id="queueB">
                            <!-- 動態生成 -->
                        </div>
                        <div class="output-area idle" id="outputB">
                            等待生產...
                        </div>
                    </div>
                </div>

                <!-- 控制區 -->
                <div class="controls">
                    <div class="unit-buttons" id="unitButtons">
                        <!-- 動態生成 -->
                    </div>
                    <div class="round-controls">
                        <button class="next-round-btn" id="nextRoundBtn">▶ 推進回合</button>
                    </div>
                </div>

                <!-- 日誌 -->
                <div class="log-area">
                    <h4>📜 系統日誌</h4>
                    <div class="log-content" id="logContent">
                        <div class="log-entry">遊戲開始！請下達生產指令。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
