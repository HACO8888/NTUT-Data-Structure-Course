<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兵營生產系統 - Barracks Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🏰 兵營生產系統</h1>
            <div class="gold-display">
                <span class="gold-icon">💰</span>
                <span class="gold-amount" id="goldAmount">150</span>
                <span class="gold-label">黃金</span>
            </div>
        </header>

        <div class="round-info">
            <h2>第 <span id="roundNum">0</span> 回合</h2>
            <button id="nextRoundBtn" class="btn-primary">▶ 推進回合</button>
        </div>

        <div class="main-content">
            <!-- 兵營 A -->
            <div class="barrack" id="barrackA">
                <div class="barrack-header">
                    <h3>🏭 A 廠</h3>
                    <span class="queue-count">佇列: <span id="countA">0</span>/2</span>
                </div>
                <div class="queue-container">
                    <div class="queue-slots">
                        <div class="slot" id="slotA0"></div>
                        <div class="slot" id="slotA1"></div>
                    </div>
                </div>
                <div class="production-area">
                    <div class="output-slot" id="outputA">
                        <span class="empty-text">等待生產...</span>
                    </div>
                </div>
            </div>

            <!-- 中央控制區 -->
            <div class="control-panel">
                <h3>📋 生產選單</h3>
                <div class="unit-buttons">
                    <button class="unit-btn" data-unit="劍士" data-cost="20">
                        <span class="unit-icon">⚔️</span>
                        <span class="unit-name">劍士</span>
                        <span class="unit-cost">20 金</span>
                    </button>
                    <button class="unit-btn" data-unit="弓手" data-cost="30">
                        <span class="unit-icon">🏹</span>
                        <span class="unit-name">弓手</span>
                        <span class="unit-cost">30 金</span>
                    </button>
                    <button class="unit-btn" data-unit="騎士" data-cost="50">
                        <span class="unit-icon">🐴</span>
                        <span class="unit-name">騎士</span>
                        <span class="unit-cost">50 金</span>
                    </button>
                    <button class="unit-btn" data-unit="投石車" data-cost="40">
                        <span class="unit-icon">🪨</span>
                        <span class="unit-name">投石車</span>
                        <span class="unit-cost">40 金</span>
                    </button>
                </div>
            </div>

            <!-- 兵營 B -->
            <div class="barrack" id="barrackB">
                <div class="barrack-header">
                    <h3>🏭 B 廠</h3>
                    <span class="queue-count">佇列: <span id="countB">0</span>/2</span>
                </div>
                <div class="queue-container">
                    <div class="queue-slots">
                        <div class="slot" id="slotB0"></div>
                        <div class="slot" id="slotB1"></div>
                    </div>
                </div>
                <div class="production-area">
                    <div class="output-slot" id="outputB">
                        <span class="empty-text">等待生產...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日誌區 -->
        <div class="log-panel">
            <h3>📜 系統日誌</h3>
            <div class="log-content" id="logContent">
                <div class="log-entry system">系統啟動完成！請開始生產單位。</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
